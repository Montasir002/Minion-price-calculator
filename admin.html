<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Bazaar Admin | Secure Mobile</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <div class="admin-container">
    
    <div id="loginScreen" class="card">
      <h2>Admin Login</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button id="loginBtn">Login</button>
    </div>

    <div id="adminDash" class="hidden">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span id="userEmail" class="email-display">loading...</span>
          <button id="logoutBtn" style="width:auto; padding:5px 10px;" class="secondary-btn">Exit</button>
        </div>
      </div>

      <div class="card search-box">
        <input type="text" id="searchInput" placeholder="Search item or ID...">
      </div>

      <div class="card" id="itemList">
        </div>

      <div style="height: 80px;"></div> <button id="saveBtn" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:540px; box-shadow: 0 0 20px rgba(0,255,0,0.3);">
        SAVE CHANGES
      </button>
      <div id="statusMsg"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABjtrXaNGiQg8TnpskdZBmybQICKB_eVk",
      authDomain: "craftersmc-bazar.firebaseapp.com",
      projectId: "craftersmc-bazar",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const priceDocRef = doc(db, "prices", "itemsV2");
    const logCollectionRef = collection(db, "admin_logs");

    const el = {
      loginScreen: document.getElementById("loginScreen"),
      adminDash: document.getElementById("adminDash"),
      itemList: document.getElementById("itemList"),
      searchInput: document.getElementById("searchInput"),
      saveBtn: document.getElementById("saveBtn"),
      statusMsg: document.getElementById("statusMsg"),
      userEmail: document.getElementById("userEmail")
    };

    let originalData = {};
    let cachedData = {};
    let itemMapping = [];

    // AUTH OBSERVER
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        el.loginScreen.classList.add("hidden");
        el.adminDash.classList.remove("hidden");
        
        // Setup Email masking
        const fullEmail = user.email;
        const maskedEmail = fullEmail.replace(/^(.)(.*)(?=@)/, (gp1, gp2, gp3) => gp2 + "*".repeat(gp3.length));
        el.userEmail.textContent = maskedEmail;
        el.userEmail.onclick = () => {
            el.userEmail.textContent = el.userEmail.textContent === maskedEmail ? fullEmail : maskedEmail;
        };

        await loadData();
      } else {
        el.loginScreen.classList.remove("hidden");
        el.adminDash.classList.add("hidden");
      }
    });

    async function loadData() {
      try {
        const [itemRes, snap] = await Promise.all([
          fetch("./Minion_recipes/items.json").then(r => r.json()),
          getDoc(priceDocRef)
        ]);

        itemMapping = itemRes;
        originalData = snap.exists() ? snap.data() : {};
        cachedData = { ...originalData };
        renderList();
      } catch (err) { console.error(err); }
    }

    function renderList() {
      const term = el.searchInput.value.toLowerCase();
      el.itemList.innerHTML = "";

      itemMapping.forEach(item => {
        const id = item.id;
        const name = item.item;
        if (!name.toLowerCase().includes(term) && !id.toLowerCase().includes(term)) return;

        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
          <div class="item-info">
            <img src="${item.url}" class="item-icon">
            <div class="name-stack">
                <strong>${name}</strong>
                <small>${id}</small>
            </div>
          </div>
          <input type="number" class="price-input" data-item="${id}" value="${cachedData[id] || 0}">
        `;
        el.itemList.appendChild(row);
      });
    }

    // EVENT LISTENERS
    document.getElementById("loginBtn").onclick = () => {
      signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value)
        .catch(err => alert("Login Failed"));
    };

    document.getElementById("logoutBtn").onclick = () => signOut(auth);

    el.searchInput.oninput = () => renderList();

    el.itemList.oninput = (e) => {
      if (e.target.dataset.item) {
        cachedData[e.target.dataset.item] = Number(e.target.value || 0);
      }
    };

    el.saveBtn.onclick = async () => {
      el.statusMsg.textContent = "Saving...";
      const changes = {};
      for (const k in cachedData) {
        if (cachedData[k] !== (originalData[k] || 0)) {
          changes[k] = { from: originalData[k] || 0, to: cachedData[k] };
        }
      }

      if (!Object.keys(changes).length) {
        el.statusMsg.textContent = "No changes to save";
        return;
      }

      try {
        await setDoc(priceDocRef, cachedData);
        await addDoc(logCollectionRef, {
          updatedBy: auth.currentUser.email,
          timestamp: serverTimestamp(),
          items: changes
        });
        originalData = { ...cachedData };
        el.statusMsg.textContent = "✅ Saved Successfully";
        setTimeout(() => el.statusMsg.textContent = "", 3000);
      } catch (err) {
        el.statusMsg.textContent = "❌ Save Failed";
      }
    };
  </script>
</body>
</html>
