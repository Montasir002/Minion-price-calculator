name: Update Bazaar Prices

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows you to trigger it manually from GitHub's Actions tab anytime

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Write Firebase service account key
        # Reconstructs the serviceAccountKey.json from the GitHub secret
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

      - name: Run price updater
        env:
          CRAFTERSMC_API_KEY: ${{ secrets.CRAFTERSMC_API_KEY }}
        run: python auto_data.py
